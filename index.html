<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center><h1>The stone paper scissor game.</h1></center>
    <div id="score_out">
        <div class="player">Player 1 score :<span id="1st" class="score"></span></div>
        <div class="player">Player 2 score :<span id="2nd" class="score"></span></div>
    </div>
    <div id="main_out">
        <div id="oneout" class="main">
            <div id="pic1" class="pic"></div>
            <div id="button1" class="b">
                <button id="stone1" class="but">Stone</button>
                <button id="paper1" class="but">Paper</button>
                <button id="scissor1" class="but">Scissor</button>
            </div>
        </div>
        <div id="twoout" class="main">
            <div id="pic2" class="pic"></div>
            <div id="button2" class="b">
                <button id="stone2" class="but">Stone</button>
                <button id="paper2" class="but">Paper</button>
                <button id="scissor2" class="but">Scissor</button>
            </div>
        </div>
    </div>
<script src="logic.js"></script>
</body>
</html>
